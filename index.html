 <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monza Custom F1 - Movimento Diagonale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        body { font-family: sans-serif; background: #222; color: white; text-align: center; margin: 0; padding: 10px; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 760px; margin: 0 auto 10px auto; }
        h1 { margin: 0; font-size: 1.8rem; }
        .btn-reset { background: #ff3333; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .btn-reset:hover { background: #cc0000; }

        #scoreboard { max-width: 740px; margin: 10px auto; font-size: 1.2rem; background: #333; padding: 10px; border-radius: 8px; min-height: 30px; }
        #game-container { display: flex; justify-content: center; position: relative; }
        
        .grid { display: grid; grid-template-columns: repeat(30, 25px); grid-template-rows: repeat(20, 25px); gap: 1px; background: #222; padding: 5px; border: 3px solid #fff; }
        .cell { width: 25px; height: 25px; background: #1a5e1a; display: flex; align-items: center; justify-content: center; font-size: 14px; position: relative; } 
        .track { background: #555; } 
        .obstacle { background: #3a3a3a !important; font-size: 12px; }
        
        .start-line { background: #2e7d32 !important; color: #fff; font-weight: bold; font-size: 11px; } 
        .finish-line { background: #fff !important; color: #000; font-weight: bold; font-size: 11px; background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 10px 10px; }
        
        .p1 { background: #ff3333; border-radius: 50%; color: white; font-weight: bold; box-shadow: 0 0 8px #ff3333; z-index: 10; } 
        .p2 { background: #3333ff; border-radius: 50%; color: white; font-weight: bold; box-shadow: 0 0 8px #3333ff; z-index: 10; } 
        .crash { background: #ffaa00 !important; animation: blink 0.3s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        #winner-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; flex-direction: column; justify-content: center; align-items: center; border-radius: 5px; }
        #winner-box { background: #333; padding: 30px; border-radius: 15px; border: 4px solid #ffcc00; max-width: 400px; box-shadow: 0 0 20px #ffcc00; }
        #winner-box h2 { color: #ffcc00; margin-top: 0; font-size: 2.2rem; }
        #winner-box p { font-size: 1.3rem; margin: 15px 0; }

        #feed-container { max-width: 760px; margin: 20px auto 0 auto; background: #111; border: 2px solid #444; border-radius: 8px; padding: 15px; text-align: left; }
        #feed-container h3 { margin-top: 0; color: #ffcc00; border-bottom: 1px solid #444; padding-bottom: 5px; }
        #log-list { list-style: none; padding: 0; margin: 0; max-height: 120px; overflow-y: auto; font-family: monospace; }
        .log-item { padding: 6px 10px; border-bottom: 1px solid #222; font-size: 0.95rem; }
        .log-item:first-child { background: #2a2a2a; color: #fff; font-weight: bold; } 
        .log-time { color: #888; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🏎️ Monza Custom Live Display</h1>
        <button class="btn-reset" onclick="resetGara()">🔄 Riavvia Gara</button>
    </div>

    <div id="scoreboard">Inizializzazione tracciato...</div>
    
    <div id="game-container">
        <div id="grid" class="grid"></div>
        
        <div id="winner-overlay">
            <div id="winner-box">
                <h2>🏆 TRAGUARDO!</h2>
                <p id="winner-text">Il pilota X ha vinto la gara!</p>
                <button class="btn-reset" onclick="resetGara()">Gioca Ancora 🔄</button>
            </div>
        </div>
    </div>

    <div id="feed-container">
        <h3>📋 DIREZIONE GARA: Feed Scansioni QR</h3>
        <ul id="log-list">
            <li class="log-item" style="color: #666;">In attesa della prima scansione dai telefoni...</li>
        </ul>
    </div>

    <script>
        const SUPABASE_URL = "https://erukzvrtjnvyzjvfuirn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_FDhQ03affjzeyhCHuoKulg_Rp7PdyLM";
        
        let db = null;
        const GRID_COLS = 30;
        const GRID_ROWS = 20;
        let lastCheckedId = 0; 
        let isGameActive = true;

        // =========================================================================
        // CONFIGURAZIONE RAPIDA PARTENZA E ARRIVO
        // =========================================================================
        const COLONNA_PARTENZA   = 9; 
        const RIGA_PARTENZA_P1   = 5;  
        const RIGA_PARTENZA_P2   = 6;  
        
        const CASELLE_ARRIVO = [
            { x: 3, y: 4 }, // Riga 11, colonna 23
            { x: 4, y: 4 }, // Riga 12, colonna 23
            { x: 5, y: 4 }, // Riga 13, colonna 22 (variata riga e colonna!)
            { x: 6, y: 4 }  // Riga 14, colonna 22 (variata riga e colonna!)
        ];
        // =========================================================================
        
        const monzaMap = Array(GRID_ROWS).fill(0).map(() => Array(GRID_COLS).fill(0));
        
        // Costruzione Mappa (Spessore 4)
        for(let x = 3; x < 27; x++) { monzaMap[11][x] = 1; monzaMap[12][x] = 1; monzaMap[13][x] = 1; monzaMap[14][x] = 1; }
        for(let y = 4; y <= 14; y++) { monzaMap[y][23] = 1; monzaMap[y][24] = 1; monzaMap[y][25] = 1; monzaMap[y][26] = 1; }
        
        // Variante Chicane superiore
        for(let x = 9; x < 26; x++) { 
            if (x >= 16 && x <= 19) {
                monzaMap[6][x] = 1; monzaMap[7][x] = 1; monzaMap[8][x] = 1; monzaMap[9][x] = 1;
            } else {
                monzaMap[4][x] = 1; monzaMap[5][x] = 1; monzaMap[6][x] = 1; monzaMap[7][x] = 1; 
            }
        }
        monzaMap[6][15] = 1; monzaMap[7][15] = 1;
        monzaMap[4][20] = 1; monzaMap[5][20] = 1;

        for(let y = 4; y <= 14; y++) { monzaMap[y][3] = 1; monzaMap[y][4] = 1; monzaMap[y][5] = 1; monzaMap[y][6] = 1; }
        
        // Ostacoli fisici 🛢️
        const ostacoli = [
            {x: 13, y: 5}, {x: 21, y: 6}, {x: 25, y: 9}, {x: 14, y: 12}, {x: 8, y: 14}
        ];
        ostacoli.forEach(o => { monzaMap[o.y][o.x] = 4; });

        // Partenza
        for (let y = 4; y <= 7; y++) { monzaMap[y][COLONNA_PARTENZA] = 2; }
        
        // Arrivo
        CASELLE_ARRIVO.forEach(casella => {
            if(casella.y < GRID_ROWS && casella.x < GRID_COLS) { monzaMap[casella.y][casella.x] = 3; }
        });
        
        let players = {};

        function drawGrid() {
            const gridDiv = document.getElementById('grid');
            gridDiv.innerHTML = '';
            for (let y = 0; y < GRID_ROWS; y++) {
                for (let x = 0; x < GRID_COLS; x++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    const cellType = monzaMap[y][x];
                    if (cellType >= 1) cell.classList.add('track');
                    if (cellType === 2) { cell.classList.add('start-line'); cell.innerText = "🏁"; }
                    if (cellType === 3) { cell.classList.add('finish-line'); cell.innerText = "🏁"; }
                    if (cellType === 4) { cell.classList.add('obstacle'); cell.innerText = "🛢️"; }
                    cell.id = `c-${x}-${y}`;
                    gridDiv.appendChild(cell);
                }
            }
        }

        function updateUI() {
            drawGrid();
            let scoreText = "";
            let idx = 1;
            for (let name in players) {
                let p = players[name];
                let sulTracciato = monzaMap[p.y][p.x] === 1 || monzaMap[p.y][p.x] === 2 || monzaMap[p.y][p.x] === 3;
                let statoPosizione = !sulTracciato ? "⚠️ INCIDENTE" : "IN PISTA";
                scoreText += `[P${idx}] ${name} - Penalità: ${p.penalties} (${statoPosizione}) | `;
                
                let cell = document.getElementById(`c-${p.x}-${p.y}`);
                if (cell) {
                    cell.classList.add(`p${idx}`);
                    cell.innerText = p.isCrashed ? '💥' : `🏎️${idx}`;
                    if (p.isCrashed || !sulTracciato) cell.classList.add('crash');
                }
                idx++;
            }
            document.getElementById('scoreboard').innerText = scoreText || "Nessun pilota in pista.";
        }

        function aggiungiAFeed(pilota, comando) {
            const logList = document.getElementById('log-list');
            if (logList.children.length === 1 && logList.children[0].style.color === "rgb(102, 102, 102)") logList.innerHTML = "";
            const oraAttuale = new Date().toLocaleTimeString();
            const nuovoLog = document.createElement('li');
            nuovoLog.classList.add('log-item');
            nuovoLog.innerHTML = `<span class="log-time">[${oraAttuale}]</span> 👤 <strong>${pilota}</strong> ha scansionato ➡️ <strong>${comando}</strong>`;
            logList.insertBefore(nuovoLog, logList.firstChild);
        }

        // Funzione helper per estrarre la direzione e i passi da una stringa tipo "SU:1"
        function analizzaSubComando(sub) {
            let [dir, passi] = sub.toUpperCase().trim().split(':');
            return { direzione: dir, passi: parseInt(passi) || 0 };
        }

        function gestisciMossa(name, command) {
            if (!isGameActive) return;

            let playerKeys = Object.keys(players);
            if (!players[name]) {
                if (playerKeys.includes("Pilota 1") && players["Pilota 1"].name === "In attesa...") {
                    players[name] = players["Pilota 1"]; players[name].name = name; delete players["Pilota 1"];
                } else if (playerKeys.includes("Pilota 2") && players["Pilota 2"].name === "In attesa...") {
                    players[name] = players["Pilota 2"]; players[name].name = name; delete players["Pilota 2"];
                } else if (!playerKeys.includes(name)) {
                    return; 
                }
            }

            if (!command || !command.includes(':')) {
                aggiungiAFeed(name, "COMANDO ERRATO");
                return;
            }

            aggiungiAFeed(name, command);
            let p = players[name];
            if (p.isCrashed) return;

            // Suddividi eventuali comandi multipli/diagonali uniti dal segno '+'
            let subComandi = command.split('+');
            
            let direzione1 = "", passi1 = 0;
            let direzione2 = "", passi2 = 0;

            if (subComandi.length >= 1) {
                let c1 = analizzaSubComando(subComandi[0]);
                direzione1 = c1.direzione; passi1 = c1.passi;
            }
            if (subComandi.length >= 2) {
                let c2 = analizzaSubComando(subComandi[1]);
                direzione2 = c2.direzione; passi2 = c2.passi;
            }

            // Calcola il numero massimo di iterazioni necessarie per completare il movimento combinato
            let passiTotali = Math.max(passi1, passi2);

            let currentX = p.x;
            let currentY = p.y;
            let lastValidX = p.x;
            let lastValidY = p.y;
            let collisioneRilevata = false;

            for (let i = 0; i < passiTotali; i++) {
                let stepX = 0;
                let stepY = 0;

                // Gestione della prima componente del movimento
                if (i < passi1) {
                    if (direzione1 === 'DESTRA' || direzione1 === 'AVANTI') stepX = 1;
                    if (direzione1 === 'SINISTRA' || direzione1 === 'INDIETRO') stepX = -1;
                    if (direzione1 === 'SU') stepY = -1;
                    if (direzione1 === 'GIU') stepY = 1;
                }

                // Gestione della seconda componente del movimento (se presente, es. Diagonale)
                if (i < passi2) {
                    if (direzione2 === 'DESTRA' || direzione2 === 'AVANTI') stepX += 1;
                    if (direzione2 === 'SINISTRA' || direzione2 === 'INDIETRO') stepX += -1;
                    if (direzione2 === 'SU') stepY += -1;
                    if (direzione2 === 'GIU') stepY += 1;
                }

                let nextX = Math.max(0, Math.min(GRID_COLS - 1, currentX + stepX));
                let nextY = Math.max(0, Math.min(GRID_ROWS - 1, currentY + stepY));

                // Controllo collisione o fuoripista
                if (monzaMap[nextY][nextX] === 0 || monzaMap[nextY][nextX] === 4) {
                    currentX = nextX;
                    currentY = nextY;
                    collisioneRilevata = true;
                    break;
                } else {
                    lastValidX = nextX;
                    lastValidY = nextY;
                    currentX = nextX;
                    currentY = nextY;
                    
                    if (monzaMap[currentY][currentX] === 3) {
                        break; 
                    }
                }
            }

            p.x = currentX;
            p.y = currentY;

            if (collisioneRilevata) {
                p.penalties += 1; p.isCrashed = true;
                updateUI();
                setTimeout(() => {
                    p.x = lastValidX; p.y = lastValidY; p.isCrashed = false;
                    updateUI();
                }, 1200);
            } else {
                updateUI();
                if (monzaMap[p.y][p.x] === 3) {
                    isGameActive = false;
                    document.getElementById('winner-text').innerHTML = `🏁 Il pilota <strong>${name}</strong> vince la gara!<br>Penalità accumulate: ${p.penalties}`;
                    document.getElementById('winner-overlay').style.display = 'flex';
                }
            }
        }

        async function resetGara() {
            document.getElementById('scoreboard').innerText = "Svuotamento database in corso...";
            if (db) {
                try { await db.from('moves').delete().gt('id', 0); } catch (err) { console.error(err); }
            }
            isGameActive = true; lastCheckedId = 0; 
            players = {
                "Pilota 1": { name: "In attesa...", x: COLONNA_PARTENZA, y: RIGA_PARTENZA_P1, penalties: 0, isCrashed: false },
                "Pilota 2": { name: "In attesa...", x: COLONNA_PARTENZA, y: RIGA_PARTENZA_P2, penalties: 0, isCrashed: false }
            };
            document.getElementById('winner-overlay').style.display = 'none';
            document.getElementById('log-list').innerHTML = '<li class="log-item" style="color: #666;">Griglia rigenerata! Pronta per i movimenti diagonali.</li>';
            updateUI();
        }

        async function fetchNuoveMosse() {
            if (!db || !isGameActive) return;
            try {
                const { data } = await db.from('moves').select('*').gt('id', lastCheckedId).order('id', { ascending: true });
                if (data && data.length > 0) {
                    data.forEach(move => { lastCheckedId = move.id; gestisciMossa(move.player_name, move.command); });
                }
            } catch (err) { console.error(err); }
        }
        
        async function init() {
            try {
                db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const { data } = await db.from('moves').select('id').order('id', { descending: true }).limit(1);
                if (data && data.length > 0) lastCheckedId = data[0].id;
                isGameActive = true;
                players = {
                    "Pilota 1": { name: "In attesa...", x: COLONNA_PARTENZA, y: RIGA_PARTENZA_P1, penalties: 0, isCrashed: false },
                    "Pilota 2": { name: "In attesa...", x: COLONNA_PARTENZA, y: RIGA_PARTENZA_P2, penalties: 0, isCrashed: false }
                };
                updateUI();
                setInterval(fetchNuoveMosse, 1000);
            } catch (e) { document.getElementById('scoreboard').innerText = "Errore: " + e.message; }
        }
        init();
    </script>
</body>
</html>
