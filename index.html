<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monza F1 - Schermo Principale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        body { font-family: sans-serif; background: #222; color: white; text-align: center; margin: 0; padding: 10px; }
        #scoreboard { margin: 10px 0; font-size: 1.2rem; background: #333; padding: 10px; border-radius: 8px; min-height: 30px; }
        #game-container { display: flex; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(30, 25px); grid-template-rows: repeat(20, 25px); gap: 1px; background: #222; padding: 5px; border: 3px solid #fff; }
        .cell { width: 25px; height: 25px; background: #1a5e1a; display: flex; align-items: center; justify-content: center; font-size: 14px; } 
        .track { background: #555; } 
        .p1 { background: #ff3333; border-radius: 50%; color: white; font-weight: bold; box-shadow: 0 0 8px #ff3333; } 
        .p2 { background: #3333ff; border-radius: 50%; color: white; font-weight: bold; box-shadow: 0 0 8px #3333ff; } 
        .crash { background: #ffaa00 !important; animation: blink 0.3s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Stili per il nuovo Feed dei QR Code in basso */
        #feed-container { max-width: 760px; margin: 20px auto 0 auto; background: #111; border: 2px solid #444; border-radius: 8px; padding: 15px; text-align: left; }
        #feed-container h3 { margin-top: 0; color: #ffcc00; border-bottom: 1px solid #444; padding-bottom: 5px; }
        #log-list { list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; font-family: monospace; }
        .log-item { padding: 6px 10px; border-bottom: 1px solid #222; font-size: 0.95rem; }
        .log-item:first-child { background: #2a2a2a; color: #fff; font-weight: bold; } /* Evidenzia l'ultima mossa */
        .log-time { color: #888; margin-right: 10px; }
    </style>
</head>
<body>

    <h1>🏎️ Monza F1 Live Display</h1>
    <div id="scoreboard">Inizializzazione tracciato...</div>
    
    <div id="game-container">
        <div id="grid" class="grid"></div>
    </div>

    <div id="feed-container">
        <h3>📋 DIREZIONE GARA: Feed Scansioni QR</h3>
        <ul id="log-list">
            <li class="log-item" style="color: #666;">In attesa della prima scansione dai telefoni...</li>
        </ul>
    </div>

    <script>
        const SUPABASE_URL = "https://erukzvrtjnvyzjvfuirn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_FDhQ03affjzeyhCHuoKulg_Rp7PdyLM";
        
        let db = null;
        const GRID_COLS = 30;
        const GRID_ROWS = 20;
        let lastCheckedId = 0; 
        
        const monzaMap = Array(GRID_ROWS).fill(0).map(() => Array(GRID_COLS).fill(0));
        for(let x=4; x<26; x++) { monzaMap[12][x] = 1; monzaMap[13][x] = 1; }
        for(let y=5; y<=12; y++) { monzaMap[y][25] = 1; monzaMap[y][24] = 1; }
        for(let x=10; x<25; x++) { monzaMap[5][x] = 1; monzaMap[6][x] = 1; }
        for(let y=5; y<=13; y++) { monzaMap[y][4] = 1; monzaMap[y][5] = 1; }
        
        let players = {};

        function drawGrid() {
            const gridDiv = document.getElementById('grid');
            gridDiv.innerHTML = '';
            for (let y = 0; y < GRID_ROWS; y++) {
                for (let x = 0; x < GRID_COLS; x++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (monzaMap[y][x] === 1) cell.classList.add('track');
                    cell.id = `c-${x}-${y}`;
                    gridDiv.appendChild(cell);
                }
            }
        }

        function updateUI() {
            drawGrid();
            let scoreText = "";
            let idx = 1;
            
            for (let name in players) {
                let p = players[name];
                let statoPosizione = monzaMap[p.y][p.x] === 0 ? "⚠️ FUORI PISTA" : "IN PISTA";
                scoreText += `[P${idx}] ${name} - Penalità: ${p.penalties} (${statoPosizione}) | `;
                
                let cell = document.getElementById(`c-${p.x}-${p.y}`);
                if (cell) {
                    cell.classList.add(`p${idx}`);
                    cell.innerText = p.isCrashed ? '💥' : `🏎️${idx}`;
                    if (p.isCrashed || monzaMap[p.y][p.x] === 0) cell.classList.add('crash');
                }
                idx++;
            }
            document.getElementById('scoreboard').innerText = scoreText || "Nessun pilota in pista. Invia una mossa dal telefono!";
        }

        // Funzione per aggiungere la scansione nel box in basso
        function aggiungiAFeed(pilota, comando) {
            const logList = document.getElementById('log-list');
            
            // Rimuove la scritta iniziale di attesa al primo inserimento
            if (logList.children.length === 1 && logList.children[0].style.color === "rgb(102, 102, 102)") {
                logList.innerHTML = "";
            }

            const oraAttuale = new Date().toLocaleTimeString();
            const nuovoLog = document.createElement('li');
            nuovoLog.classList.add('log-item');
            
            // Colore differente in base al comando o all'incidente
            let dettagliComando = `ha scansionato ➡️ <strong>${comando}</strong>`;
            if (comando.includes('?') || comando === '') dettagliComando = `ha scansionato un codice non valido.`;

            nuovoLog.innerHTML = `<span class="log-time">[${oraAttuale}]</span> 👤 <strong>${pilota}</strong> ${dettagliComando}`;
            
            // Inserisce l'ultimo evento in cima alla lista
            logList.insertBefore(nuovoLog, logList.firstChild);
        }

        function gestisciMossa(name, command) {
            if (!command || !command.includes(':')) {
                aggiungiAFeed(name, "COMANDO ERRATO");
                return;
            }

            // Aggiunge la notifica nel feed visivo in basso
            aggiungiAFeed(name, command);

            if (!players[name]) {
                let autoAttuali = Object.keys(players).length;
                if(autoAttuali >= 2) return; 
                players[name] = { x: 6, y: (autoAttuali === 0 ? 12 : 13), penalties: 0, isCrashed: false };
            }

            let p = players[name];
            p.isCrashed = false;

            let [direzione, passi] = command.toUpperCase().trim().split(':');
            passi = parseInt(passi) || 0;

            let targetX = p.x;
            let targetY = p.y;

            if (direzione === 'AVANTI') targetX += passi;
            if (direzione === 'INDIETRO') targetX -= passi;
            if (direzione === 'SU') targetY -= passi;
            if (direzione === 'GIU') targetY += passi;

            targetX = Math.max(0, Math.min(GRID_COLS - 1, targetX));
            targetY = Math.max(0, Math.min(GRID_ROWS - 1, targetY));

            p.x = targetX;
            p.y = targetY;

            if (monzaMap[p.y][p.x] === 0) {
                p.penalties += 1;
                p.isCrashed = true;
            }

            updateUI();

            if(p.isCrashed) {
                setTimeout(() => { p.isCrashed = false; updateUI(); }, 1000);
            }
        }

        async function fetchNuoveMosse() {
            if (!db) return;
            try {
                const { data, error } = await db
                    .from('moves')
                    .select('*')
                    .gt('id', lastCheckedId)
                    .order('id', { ascending: true });

                if (data && data.length > 0) {
                    data.forEach(move => {
                        lastCheckedId = move.id;
                        gestisciMossa(move.player_name, move.command);
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }
        
        async function init() {
            try {
                db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const { data } = await db.from('moves').select('id').order('id', { descending: true }).limit(1);
                if (data && data.length > 0) {
                    lastCheckedId = data[0].id;
                }
                updateUI();
                setInterval(fetchNuoveMosse, 1000);
            } catch (e) {
                document.getElementById('scoreboard').innerText = "Errore: " + e.message;
            }
        }

        init();
    </script>
</body>
</html>
