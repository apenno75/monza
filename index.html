<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monza F1 - Schermo Principale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        body { font-family: sans-serif; background: #222; color: white; text-align: center; margin: 0; padding: 10px; }
        #scoreboard { margin: 10px 0; font-size: 1.2rem; background: #333; padding: 10px; border-radius: 8px; }
        #game-container { display: flex; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(30, 25px); grid-template-rows: repeat(20, 25px); gap: 1px; background: #444; padding: 5px; }
        .cell { width: 25px; height: 25px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .track { background: #777; } 
        .p1 { background: #ff3333; border-radius: 50%; color: white; font-weight: bold; } 
        .p2 { background: #3333ff; border-radius: 50%; color: white; font-weight: bold; } 
        .crash { background: #ffaa00 !important; }
    </style>
</head>
<body>

    <h1>🏎️ Monza F1 Live Display</h1>
    <div id="scoreboard">In attesa di piloti... Scansiona il QR del controller per connetterti.</div>
    
    <div id="game-container">
        <div id="grid" class="grid"></div>
    </div>

    <script>
        // CONFIGURAZIONE CREDENZIALI
        const SUPABASE_URL = "https://erukzvrtjnvyzjvfuirn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_FDhQ03affjzeyhCHuoKulg_Rp7PdyLM";
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const GRID_COLS = 30;
        const GRID_ROWS = 20;
        let lastCheckedId = 0; // Serve per controllare solo le nuove mosse
        
        // Mappa logica di Monza (1 = Pista, 0 = Fuori)
        const monzaMap = Array(GRID_ROWS).fill(0).map(() => Array(GRID_COLS).fill(0));
        for(let x=4; x<26; x++) { monzaMap[12][x] = 1; monzaMap[13][x] = 1; }
        for(let y=5; y<=12; y++) { monzaMap[y][25] = 1; monzaMap[y][24] = 1; }
        for(let x=10; x<25; x++) { monzaMap[5][x] = 1; monzaMap[6][x] = 1; }
        for(let y=5; y<=13; y++) { monzaMap[y][4] = 1; monzaMap[y][5] = 1; }
        
        let players = {};

        function drawGrid() {
            const gridDiv = document.getElementById('grid');
            gridDiv.innerHTML = '';
            for (let y = 0; y < GRID_ROWS; y++) {
                for (let x = 0; x < GRID_COLS; x++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (monzaMap[y][x] === 1) cell.classList.add('track');
                    cell.id = `c-${x}-${y}`;
                    gridDiv.appendChild(cell);
                }
            }
        }

        function updateUI() {
            drawGrid();
            let scoreText = "";
            let idx = 1;
            
            for (let name in players) {
                let p = players[name];
                scoreText += `[P${idx}] ${name} - Penalità: ${p.penalties} | `;
                
                let cell = document.getElementById(`c-${p.x}-${p.y}`);
                if (cell) {
                    cell.classList.add(`p${idx}`);
                    cell.innerText = p.isCrashed ? '💥' : `🏎️${idx}`;
                    if (p.isCrashed) cell.classList.add('crash');
                }
                idx++;
            }
            document.getElementById('scoreboard').innerText = scoreText || "In attesa di piloti...";
        }

        // Funzione principale che muove le auto
        function gestisciMossa(name, command) {
            if (!players[name]) {
                let autoAttuali = Object.keys(players).length;
                if(autoAttuali >= 2) return; 
                players[name] = { x: 5, y: (autoAttuali === 0 ? 12 : 13), penalties: 0, isCrashed: false };
            }

            let p = players[name];
            p.isCrashed = false;

            let [direzione, passi] = command.split(':');
            passi = parseInt(passi) || 0;

            let targetX = p.x;
            let targetY = p.y;

            if (direzione === 'AVANTI') targetX += passi;
            if (direzione === 'INDIETRO') targetX -= passi;
            if (direzione === 'SU') targetY -= passi;
            if (direzione === 'GIU') targetY += passi;

            targetX = Math.max(0, Math.min(GRID_COLS - 1, targetX));
            targetY = Math.max(0, Math.min(GRID_ROWS - 1, targetY));

            if (monzaMap[targetY][targetX] === 0) {
                p.penalties += 1;
                p.isCrashed = true;
            } else {
                p.x = targetX;
                p.y = targetY;
            }

            updateUI();

            if(p.isCrashed) {
                setTimeout(() => { p.isCrashed = false; updateUI(); }, 1200);
            }
        }

        // ASCOLTO IN TEMPO REALE (Canale principale)
        db.channel('moves_channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'moves' }, payload => {
                const move = payload.new;
                if (move.id > lastCheckedId) {
                    lastCheckedId = move.id;
                    gestisciMossa(move.player_name, move.command);
                }
            })
            .subscribe();

        // SISTEMA DI SICUREZZA (Controlla ogni 2 secondi se il Realtime si addormenta)
        async function fetchNuoveMosse() {
            const { data, error } = await db
                .from('moves')
                .select('*')
                .gt('id', lastCheckedId)
                .order('id', { ascending: true });

            if (data && data.length > 0) {
                data.forEach(move => {
                    lastCheckedId = move.id;
                    gestisciMossa(move.player_name, move.command);
                });
            }
        }
        
        // Sincronizza l'ID iniziale per non rileggere le vecchie partite all'avvio
        async function init() {
            const { data } = await db.from('moves').select('id').order('id', { descending: true }).limit(1);
            if (data && data.length > 0) {
                lastCheckedId = data[0].id;
            }
            drawGrid();
            setInterval(fetchNuoveMosse, 2000); // Avvia il controllo di sicurezza alternativo
        }

        init();
    </script>
</body>
</html>
