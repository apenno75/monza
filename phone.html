<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monza F1 - Scanner Pilota</title>
    <!-- Libreria per QR Code e Supabase -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; background: #222; border-radius: 12px; overflow: hidden; }
        button { background: #00cc66; color: black; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; width: 100%; max-width: 400px; display: none; }
        button:active { background: #00aa55; }
        #status { margin: 20px 0; font-size: 1.1rem; color: #aaa; }
        .success { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🏎️ Scanner Comando F1</h1>
    
    <div id="status">Inizializzazione...</div>

    <!-- Area Fotocamera -->
    <div id="reader"></div>

    <!-- Pulsante di sblocco (nascosto di default) -->
    <button id="btn-riattiva" onclick="riattivaScanner()">🔄 ABILITA PROSSIMA SCANSIONE</button>

    <script>
    const SUPABASE_URL = "https://erukzvrtjnvyzjvfuirn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_FDhQ03affjzeyhCHuoKulg_Rp7PdyLM";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Recupera il nome del pilota salvato o lo chiede all'inizio
        let playerName = localStorage.getItem('f1_player_name');
        if (!playerName) {
            playerName = prompt("Inserisci il tuo nome da Pilota:") || "Anonimo";
            localStorage.setItem('f1_player_name', playerName);
        }

        let html5QrcodeScanner = null;
        let isScanning = false;

        function avviaScanner() {
            document.getElementById('status').innerText = "Inquadra il QR Code del movimento...";
            document.getElementById('btn-riattiva').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            isScanning = true;

            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, // Usa la fotocamera posteriore
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                document.getElementById('status').innerText = "Errore fotocamera: " + err;
            });
        }

        async function onScanSuccess(decodedText) {
            // Se lo scanner è già stato stoppato in questo millesimo di secondo, esce
            if (!isScanning) return; 
            
            isScanning = false;
            document.getElementById('status').innerHTML = `Scansione letta: <span class="success">${decodedText}</span>. Invio in corso...`;

            // 1. STOPPA IMMEDIATAMENTE LA FOTOCAMERA
            try {
                await html5QrcodeScanner.stop();
                document.getElementById('reader').style.display = 'none'; // Nasconde il riquadro video
            } catch (err) {
                console.error("Errore nello stop dello scanner:", err);
            }

            // 2. INVIA IL DATI A SUPABASE
            try {
                const { error } = await db.from('moves').insert([
                    { player_name: playerName, command: decodedText.trim() }
                ]);

                if (error) throw error;

                // 3. MOSTRA IL PULSANTE DI SBLOCCO
                document.getElementById('status').innerHTML = `✅ Mossa <span class="success">${decodedText}</span> inviata! <br>Premi il tasto sotto per muoverti di nuovo.`;
                document.getElementById('btn-riattiva').style.display = 'block';

            } catch (err) {
                document.getElementById('status').innerText = "Errore di rete: " + err.message;
                // In caso di errore di rete permette comunque di riprovare
                document.getElementById('btn-riattiva').style.display = 'block';
            }
        }

        function onScanFailure(error) {
            // Ignoriamo gli errori di mancato rilevamento continui per non intasare i log
        }

        // Funzione legata al pulsante per ripartire
        function riattivaScanner() {
            avviaScanner();
        }

        // Avvio automatico alla prima apertura della pagina
        window.onload = avviaScanner;
    </script>
</body>
</html>
